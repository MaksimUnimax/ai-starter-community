<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  {% if meta_description %}
    <meta name="description" content="{{ meta_description }}">
  {% endif %}
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="page">
  <div class="page-shell">
    <header class="top-nav" aria-label="Основная навигация">
      <a class="nav-link" href="/">Главная</a>
      {% if current_user %}
        <a class="nav-link" href="/materials">Работа с ИИ</a>
        <a class="nav-link" href="/cabinet">Личный кабинет</a>
        {% if current_user.role == "admin" %}
          <a class="nav-link" href="/admin">Админ-панель</a>
        {% endif %}
        <form class="nav-form" method="post" action="/logout">
          <button class="nav-link nav-button" type="submit">Выйти</button>
        </form>
      {% else %}
        <a class="nav-link" href="/login">Вход / регистрация</a>
      {% endif %}
    </header>
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
