<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Кабинет</h1>
    <p>{{ access_status_label }}</p>
    <p>Email: {{ user_email }}</p>
    <p>Логин: {{ user_login }}</p>
    <p>Платёж, материалы и тарифы появятся позже. Сейчас доступ ещё не активирован.</p>
    <form method="post" action="/logout">
      <button type="submit">Выйти</button>
    </form>
    <p>
      <a href="/">На главную</a>
      <a href="/login">Вход</a>
      <a href="/register">Регистрация</a>
    </p>
  </main>
</body>
</html>
