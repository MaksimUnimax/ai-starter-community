<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Вход</h1>
    <p>Страница входа в AI Starter Community находится в подготовке.</p>
    <form method="post" action="/login">
      <label>Email <input type="email" name="email" autocomplete="email"></label><br>
      <label>Пароль <input type="password" name="password" autocomplete="current-password"></label><br>
      <button type="submit">Войти</button>
    </form>
    <p><a href="/register">Регистрация</a></p>
  </main>
</body>
</html>
