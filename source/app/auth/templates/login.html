<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Вход</h1>
    <p>Войдите по email или login.</p>
    {% if notice %}
      <p>{{ notice }}</p>
    {% endif %}
    {% if error %}
      <p>{{ error }}</p>
    {% endif %}
    {% if unverified %}
      <p>
        <a href="/resend-verification">Отправить письмо для подтверждения ещё раз</a>
      </p>
    {% endif %}
    <form method="post" action="/login">
      <label>Email или login
        <input type="text" name="email_or_login" value="{{ email_or_login or '' }}" autocomplete="username">
      </label><br>
      <label>Пароль
        <input type="password" name="password" autocomplete="current-password">
      </label><br>
      <button type="submit">Войти</button>
    </form>
    <p>
      <a href="/register">Регистрация</a>
      <a href="/forgot-password">Забыли пароль?</a>
      <a href="/resend-verification">Подтверждение email</a>
      <a href="/">На главную</a>
    </p>
  </main>
</body>
</html>
