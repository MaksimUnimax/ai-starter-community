{% extends "base.html" %}

{% block content %}
  <section class="card stack">
    <div class="stack">
      <p class="muted">Проверка подтверждения</p>
      <h1 class="section-title">Подтверждение почты</h1>
    </div>

    {% if success %}
      <div class="alert alert-info">{{ message }}</div>
      <div class="actions">
        <a class="button button-primary" href="/login">Перейти ко входу</a>
      </div>
    {% else %}
      <div class="alert alert-error">{{ message }}</div>
      <div class="actions">
        <a class="button button-primary" href="/resend-verification">Отправить письмо ещё раз</a>
        <a class="button button-secondary" href="/register">Вернуться к регистрации</a>
      </div>
    {% endif %}
  </section>
{% endblock %}
