<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Подтверждение email</h1>
    {% if success %}
      <p>{{ message }}</p>
      <p><a href="/login">Перейти ко входу</a></p>
    {% else %}
      <p>{{ message }}</p>
      <p><a href="/register">Вернуться к регистрации</a></p>
    {% endif %}
  </main>
</body>
</html>
