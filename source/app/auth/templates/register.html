<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Регистрация</h1>
    <p>Создайте аккаунт, затем подтвердите email по ссылке из письма.</p>
    <p>После регистрации вы увидите страницу подтверждения email.</p>
    {% if notice %}
      <p>{{ notice }}</p>
    {% endif %}
    {% if error %}
      <p>{{ error }}</p>
    {% endif %}
    <form method="post" action="/register">
      <label>Email
        <input type="email" name="email" value="{{ email or '' }}" autocomplete="email">
      </label><br>
      <label>Логин
        <input type="text" name="login" value="{{ login or '' }}" autocomplete="username">
      </label><br>
      <label>Пароль
        <input type="password" name="password" autocomplete="new-password">
      </label><br>
      <label>Повтор пароля
        <input type="password" name="repeat_password" autocomplete="new-password">
      </label><br>
      <button type="submit">Создать аккаунт</button>
    </form>
    <p>
      <a href="/login">Вход</a>
      <a href="/check-email">Проверка email</a>
      <a href="/">На главную</a>
    </p>
  </main>
</body>
</html>
