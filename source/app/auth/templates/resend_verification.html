<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Повторная отправка письма</h1>
    <p>Если аккаунт существует и email ещё не подтверждён, мы отправим новое письмо.</p>
    {% if notice %}
      <p>{{ notice }}</p>
    {% endif %}
    {% if error %}
      <p>{{ error }}</p>
    {% endif %}
    <form method="post" action="/resend-verification">
      <label>Email
        <input type="email" name="email" value="{{ email or '' }}" autocomplete="email">
      </label><br>
      <button type="submit">Отправить повторно</button>
    </form>
    <p>
      <a href="/check-email">Проверка email</a>
      <a href="/login">Вход</a>
      <a href="/register">Регистрация</a>
    </p>
  </main>
</body>
</html>
