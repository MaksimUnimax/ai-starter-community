<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <main>
    <h1>Сброс пароля</h1>
    <p>Введите email, и если аккаунт существует, мы отправим ссылку для сброса.</p>
    {% if notice %}
      <p>{{ notice }}</p>
    {% endif %}
    {% if error %}
      <p>{{ error }}</p>
    {% endif %}
    <form method="post" action="/forgot-password">
      <label>Email
        <input type="email" name="email" value="{{ email or '' }}" autocomplete="email">
      </label><br>
      <button type="submit">Отправить ссылку</button>
    </form>
    <p><a href="/login">Вход</a></p>
  </main>
</body>
</html>
